<button class="wf-side-toggle"
        type="button"
        (click)="toggleSidebar()"
        [attr.aria-expanded]="isOpen()"
        aria-controls="sidebar-nav"
        [attr.aria-label]="isOpen() ? 'סגור תפריט' : 'פתח תפריט'">
  <i class="pi" [ngClass]="isOpen() ? 'pi-times' : 'pi-bars'"></i>
</button>

<div class="wf-side-overlay" [class.show]="isOpen()" (click)="closeSidebar()"></div>

<nav id="sidebar-nav" class="wf-side" [class.open]="isOpen()">

  <button class="wf-side-close" type="button" (click)="closeSidebar()" aria-label="סגור תפריט">
    <i class="pi pi-times"></i>
  </button>

  <div class="wf-side-brand">
    <div class="wf-side-logo">IH</div>
    <span class="wf-side-brand-text">InvoiceHub</span>
  </div>

  <div class="wf-side-section-label">תפריט</div>

  <div class="wf-side-list">
    <a *ngFor="let item of menuItems; let i = index"
       [routerLink]="item.route"
       routerLinkActive="is-active"
       #rla="routerLinkActive"
       class="wf-side-item"
       (click)="closeSidebar()">
      <span class="wf-side-item-num">{{ '0' + (i + 1) }}</span>
      <span class="wf-side-item-label">{{ item.label }}</span>
      <span class="wf-side-item-dot" *ngIf="rla.isActive"></span>
    </a>
  </div>

  <div class="wf-side-foot">
    <button class="wf-side-logout" type="button" (click)="logout()">
      <i class="pi pi-sign-out"></i>
      <span>יציאה</span>
    </button>

    <div class="wf-side-divider"></div>

    <div class="wf-side-user" *ngIf="user$ | async as user">
      <div class="wf-side-avatar">{{ (user.username || '?').charAt(0) }}</div>
      <div class="wf-side-user-info">
        <span class="wf-side-user-name">{{ user.username }}</span>
        <span class="wf-side-user-email">{{ user.email }}</span>
      </div>
    </div>
  </div>
</nav>
