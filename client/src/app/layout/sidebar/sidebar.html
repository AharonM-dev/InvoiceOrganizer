<button class="wf-side-toggle"
        type="button"
        (click)="toggleSidebar()"
        [attr.aria-expanded]="isOpen()"
        aria-controls="sidebar-nav"
        [attr.aria-label]="isOpen() ? 'סגור תפריט' : 'פתח תפריט'">
  <i class="pi" [ngClass]="isOpen() ? 'pi-times' : 'pi-bars'"></i>
</button>

<div class="wf-side-overlay" [class.show]="isOpen()" (click)="closeSidebar()"></div>

<nav id="sidebar-nav"
     class="wf-side"
     [class.open]="isOpen()"
     [class.is-collapsed]="isCollapsed()">

  <button class="wf-side-close" type="button" (click)="closeSidebar()" aria-label="סגור תפריט">
    <i class="pi pi-times"></i>
  </button>

  <div class="wf-side-brand">
    <div class="wf-side-logo">IH</div>
    <span class="wf-side-brand-text">InvoiceHub</span>
    <button type="button"
            class="wf-side-collapse-btn"
            (click)="toggleCollapsed()"
            [attr.aria-pressed]="isCollapsed()"
            [attr.aria-label]="isCollapsed() ? 'הרחב תפריט' : 'כווץ תפריט'"
            [attr.title]="isCollapsed() ? 'הרחב תפריט' : 'כווץ תפריט'">
      <i class="pi" [ngClass]="isCollapsed() ? 'pi-angle-left' : 'pi-angle-right'"></i>
    </button>
  </div>

  <div class="wf-side-section-label">תפריט</div>

  <div class="wf-side-list">
    <a *ngFor="let item of menuItems"
       [routerLink]="item.route"
       routerLinkActive="is-active"
       class="wf-side-item"
       [attr.title]="isCollapsed() ? item.label : null"
       (click)="closeSidebar()">
      <i class="wf-side-item-icon" [ngClass]="item.icon" aria-hidden="true"></i>
      <span class="wf-side-item-label">{{ item.label }}</span>
    </a>
  </div>

  <div class="wf-side-foot">
    <button class="wf-side-logout"
            type="button"
            (click)="logout()"
            [attr.title]="isCollapsed() ? 'יציאה' : null"
            [attr.aria-label]="'יציאה'">
      <i class="pi pi-sign-out"></i>
      <span class="wf-side-logout-label">יציאה</span>
    </button>

    <div class="wf-side-divider"></div>

    <div class="wf-side-user"
         *ngIf="user$ | async as user"
         [attr.title]="isCollapsed() ? (user.username + ' · ' + user.email) : null">
      <div class="wf-side-avatar">{{ (user.username || '?').charAt(0) }}</div>
      <div class="wf-side-user-info">
        <span class="wf-side-user-name">{{ user.username }}</span>
        <span class="wf-side-user-email">{{ user.email }}</span>
      </div>
    </div>
  </div>
</nav>
