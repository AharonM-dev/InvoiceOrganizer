<p-dialog
  [visible]="visible"
  (onHide)="cancel()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: 'min(420px, calc(100vw - 32px))' }"
  header="הוספת קטגוריה חדשה"
  dir="rtl"
>
  <form [formGroup]="form" (ngSubmit)="save()" class="wf-modal-form" dir="rtl">

    <!-- שם קטגוריה -->
    <div class="wf-modal-field">
      <label class="wf-mono">
        שם קטגוריה <span class="wf-modal-required">*</span>
      </label>
      <input
        pInputText
        type="text"
        formControlName="name"
        placeholder="לדוגמה: מזון, תחבורה"
        [class.ng-invalid]="nameControl?.invalid && nameControl?.touched"
      />
      <p *ngIf="nameControl?.invalid && nameControl?.touched" class="wf-modal-error">
        שם קטגוריה הוא שדה חובה (לפחות 2 תווים)
      </p>
    </div>

    <!-- הודעת שגיאה כללית -->
    <p *ngIf="errorMessage" class="wf-modal-banner">
      {{ errorMessage }}
    </p>

  </form>

  <!-- Footer -->
  <ng-template pTemplate="footer">
    <div class="wf-modal-actions" dir="rtl">
      <p-button
        label="שמור קטגוריה"
        icon="pi pi-check"
        [loading]="isSaving"
        [disabled]="isSaving"
        (click)="save()"
      />
      <p-button
        label="ביטול"
        icon="pi pi-times"
        severity="secondary"
        styleClass="p-button-outlined"
        [disabled]="isSaving"
        (click)="cancel()"
      />
    </div>
  </ng-template>
</p-dialog>
