<p-dialog
  [visible]="visible"
  (onHide)="cancel()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '480px' }"
  header="הוספת ספק חדש"
  dir="rtl"
>
  <form [formGroup]="form" (ngSubmit)="save()" class="wf-modal-form" dir="rtl">

    <!-- שם ספק -->
    <div class="wf-modal-field">
      <label class="wf-mono">
        שם ספק <span class="wf-modal-required">*</span>
      </label>
      <input
        pInputText
        type="text"
        formControlName="name"
        placeholder="לדוגמה: חברת א' בע&quot;מ"
        [class.ng-invalid]="nameControl?.invalid && nameControl?.touched"
      />
      <p *ngIf="nameControl?.invalid && nameControl?.touched" class="wf-modal-error">
        שם ספק הוא שדה חובה (לפחות 2 תווים)
      </p>
    </div>

    <!-- מספר ספק / ח.פ -->
    <div class="wf-modal-field">
      <label class="wf-mono">
        מספר ספק / ח.פ <span class="wf-modal-required">*</span>
      </label>
      <input
        pInputText
        type="text"
        formControlName="supNum"
        placeholder="לדוגמה: 512345678"
        inputmode="numeric"
        [class.ng-invalid]="supNumControl?.invalid && supNumControl?.touched"
      />
      <p *ngIf="supNumControl?.invalid && supNumControl?.touched" class="wf-modal-error">
        <span *ngIf="supNumControl?.hasError('required')">מספר ספק הוא שדה חובה</span>
        <span *ngIf="supNumControl?.hasError('pattern')">יש להזין ספרות בלבד</span>
      </p>
    </div>

    <!-- אימייל -->
    <div class="wf-modal-field">
      <label class="wf-mono">אימייל</label>
      <input
        pInputText
        type="email"
        formControlName="contactEmail"
        placeholder="supplier@example.com"
        dir="ltr"
        [class.ng-invalid]="emailControl?.invalid && emailControl?.touched"
      />
      <p *ngIf="emailControl?.invalid && emailControl?.touched" class="wf-modal-error">
        כתובת אימייל לא תקינה
      </p>
    </div>

    <!-- טלפון -->
    <div class="wf-modal-field">
      <label class="wf-mono">טלפון</label>
      <input
        pInputText
        type="tel"
        formControlName="phoneNumber"
        placeholder="050-0000000"
        dir="ltr"
      />
    </div>

    <!-- כתובת -->
    <div class="wf-modal-field">
      <label class="wf-mono">כתובת</label>
      <input
        pInputText
        type="text"
        formControlName="address"
        placeholder="רחוב, עיר"
      />
    </div>

    <!-- הודעת שגיאה כללית -->
    <p *ngIf="errorMessage" class="wf-modal-banner">
      {{ errorMessage }}
    </p>

  </form>

  <!-- Footer -->
  <ng-template pTemplate="footer">
    <div class="wf-modal-actions" dir="rtl">
      <p-button
        label="שמור ספק"
        icon="pi pi-check"
        [loading]="isSaving"
        [disabled]="isSaving"
        (click)="save()"
      />
      <p-button
        label="ביטול"
        icon="pi pi-times"
        severity="secondary"
        styleClass="p-button-outlined"
        [disabled]="isSaving"
        (click)="cancel()"
      />
    </div>
  </ng-template>
</p-dialog>
