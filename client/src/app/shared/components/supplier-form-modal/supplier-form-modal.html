<p-dialog
  [visible]="visible"
  (onHide)="cancel()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '480px' }"
  header="הוספת ספק חדש"
  dir="rtl"
>
  <form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-4 pt-2" dir="rtl">

    <!-- שם ספק -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">
        שם ספק <span class="text-red-500">*</span>
      </label>
      <input
        pInputText
        type="text"
        formControlName="name"
        placeholder="לדוגמה: חברת א' בע&quot;מ"
        class="w-full"
        [class.ng-invalid]="nameControl?.invalid && nameControl?.touched"
      />
      <p *ngIf="nameControl?.invalid && nameControl?.touched" class="text-xs text-red-500">
        שם ספק הוא שדה חובה (לפחות 2 תווים)
      </p>
    </div>

    <!-- מספר ספק / ח.פ -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">
        מספר ספק / ח.פ <span class="text-red-500">*</span>
      </label>
      <input
        pInputText
        type="text"
        formControlName="supNum"
        placeholder="לדוגמה: 512345678"
        inputmode="numeric"
        class="w-full"
        [class.ng-invalid]="supNumControl?.invalid && supNumControl?.touched"
      />
      <p *ngIf="supNumControl?.invalid && supNumControl?.touched" class="text-xs text-red-500">
        <span *ngIf="supNumControl?.hasError('required')">מספר ספק הוא שדה חובה</span>
        <span *ngIf="supNumControl?.hasError('pattern')">יש להזין ספרות בלבד</span>
      </p>
    </div>

    <!-- אימייל -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">אימייל</label>
      <input
        pInputText
        type="email"
        formControlName="contactEmail"
        placeholder="supplier@example.com"
        class="w-full"
        [class.ng-invalid]="emailControl?.invalid && emailControl?.touched"
      />
      <p *ngIf="emailControl?.invalid && emailControl?.touched" class="text-xs text-red-500">
        כתובת אימייל לא תקינה
      </p>
    </div>

    <!-- טלפון -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">טלפון</label>
      <input
        pInputText
        type="tel"
        formControlName="phoneNumber"
        placeholder="050-0000000"
        class="w-full"
      />
    </div>

    <!-- כתובת -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">כתובת</label>
      <input
        pInputText
        type="text"
        formControlName="address"
        placeholder="רחוב, עיר"
        class="w-full"
      />
    </div>

    <!-- הודעת שגיאה כללית -->
    <p *ngIf="errorMessage" class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
      {{ errorMessage }}
    </p>

  </form>

  <!-- Footer -->
  <ng-template pTemplate="footer">
    <div class="flex justify-start gap-3" dir="rtl">
      <p-button
        label="שמור ספק"
        icon="pi pi-check"
        [loading]="isSaving"
        [disabled]="isSaving"
        (click)="save()"
        severity="success"
      />
      <p-button
        label="ביטול"
        icon="pi pi-times"
        severity="secondary"
        [disabled]="isSaving"
        (click)="cancel()"
      />
    </div>
  </ng-template>
</p-dialog>
