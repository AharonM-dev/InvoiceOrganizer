<!-- Dropzone -->
<div
  class="fu-dropzone"
  [class.is-dragover]="isDragOver"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
>
  <div class="fu-dropzone-inner">
    <div class="fu-dropzone-icon">
      <i class="pi pi-arrow-up"></i>
    </div>
    <div class="fu-dropzone-copy">
      <h3 class="fu-dropzone-title">גרור קבצים לכאן</h3>
      <p class="fu-dropzone-sub">
        או
        <button type="button" class="fu-link" (click)="fileInput.click()">בחר מהמחשב</button>
        · PDF, JPG, PNG, TIFF · עד 10MB
      </p>
    </div>
    <div class="fu-dropzone-ctas">
      <button type="button" class="wf-btn wf-btn-primary" (click)="fileInput.click()">בחר קבצים</button>
    </div>
    <input
      #fileInput
      type="file"
      multiple
      accept=".pdf,.jpg,.jpeg,.png,.tiff"
      (change)="onFileSelected($event)"
      class="fu-input"
    />
  </div>
</div>

<!-- Selected files list -->
<div *ngIf="files.length > 0" class="fu-files">
  <div *ngFor="let file of files; let i = index" class="fu-file">
    <div class="fu-file-icon">
      <i [class]="'pi ' + (file.type === 'application/pdf' ? 'pi-file-pdf' : 'pi-image')"></i>
    </div>
    <div class="fu-file-meta">
      <span class="fu-file-name" [title]="file.name">{{ file.name }}</span>
      <span class="fu-file-size wf-num">{{ formatSize(file.size) }}</span>
    </div>
    <button type="button"
            class="fu-file-remove"
            (click)="removeFile(i)"
            aria-label="הסר קובץ">
      <i class="pi pi-times"></i>
    </button>
  </div>
</div>
