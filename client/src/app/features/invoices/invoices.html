<app-top-bar breadcrumb="חשבוניות" title="כל החשבוניות">
  <div actions class="inv-topbar-actions">
    <button class="wf-btn wf-btn-primary" type="button">+ חשבונית</button>
  </div>
</app-top-bar>

<div class="wf-page inv">

  <!-- Search bar -->
  <div class="inv-filterbar">
    <div class="inv-search">
      <i class="pi pi-search"></i>
      <input
        type="text"
        placeholder="חיפוש לפי ספק או מספר חשבונית"
        class="inv-search-input"
        [value]="search()"
        (input)="onSearchChange($any($event.target).value)"
      />
    </div>
  </div>

  <!-- Table -->
  <div class="wf-surface inv-table-wrap">
    <table class="inv-table">
      <thead>
        <tr>
          <th class="inv-th">מס׳</th>
          <th class="inv-th">ספק</th>
          <th class="inv-th">תאריך</th>
          <th class="inv-th inv-th-amount">סכום</th>
          <th class="inv-th" aria-hidden="true"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let inv of filteredInvoices()" class="inv-row">
          <td class="wf-num inv-cell-id">#{{ inv.invoiceNumber }}</td>
          <td class="inv-cell-vendor">
            <span class="inv-avatar">{{ (inv.vendor || '?').charAt(0) }}</span>
            <span>{{ inv.vendor || '—' }}</span>
          </td>
          <td class="wf-num">{{ inv.date }}</td>
          <td class="wf-num inv-cell-amount">
            {{ inv.amount | number : '1.2-2' }}
          </td>
          <td class="inv-cell-actions">
            <button class="inv-action" type="button"
                    (click)="deleteInvoice(inv.id)"
                    aria-label="מחיקה">
              <i class="pi pi-trash"></i>
            </button>
          </td>
        </tr>

        <tr *ngIf="filteredInvoices().length === 0">
          <td class="inv-empty" colspan="5">אין חשבוניות תואמות לחיפוש.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="inv-foot">
    <span class="inv-foot-count">
      מציג {{ filteredInvoices().length }} מתוך {{ totalCount() }} חשבוניות
    </span>
  </div>

</div>
