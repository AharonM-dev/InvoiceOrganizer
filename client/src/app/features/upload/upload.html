<div class="max-w-3xl mx-auto px-4 py-8" dir="rtl">

  <!-- כותרת -->
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-800">העלאת חשבוניות</h1>
    <p class="text-gray-500 text-sm mt-1">העלה קבצי PDF, JPG, PNG או TIFF לעיבוד אוטומטי</p>
  </div>

  <!-- קומפוננט בחירת קבצים -->
  <app-file-upload
    (filesSelected)="onFilesSelected($event)"
    (validationError)="onValidationError($event)"
  ></app-file-upload>

  <!-- הודעות שגיאת ולידציה -->
  <div *ngIf="validationErrors.length > 0" class="mt-4 flex flex-col gap-2">
    <div
      *ngFor="let err of validationErrors; let i = index"
      class="flex items-start justify-between bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm"
    >
      <div class="flex items-center gap-2">
        <i class="fas fa-exclamation-circle text-red-400 mt-0.5 flex-shrink-0"></i>
        <span>{{ err }}</span>
      </div>
      <button
        type="button"
        (click)="dismissError(i)"
        class="text-red-300 hover:text-red-500 transition-colors mr-2 flex-shrink-0"
      >
        <i class="fas fa-times"></i>
      </button>
    </div>
  </div>

  <!-- כפתור העלאה -->
  <div class="flex justify-start mt-5">
    <button
      type="button"
      (click)="onUpload()"
      [disabled]="files.length === 0 || isUploading"
      class="flex items-center gap-2 px-6 py-2.5 rounded-xl font-semibold text-white transition-all duration-200 shadow-sm
             bg-green-500 hover:bg-green-600 active:bg-green-700
             disabled:bg-gray-300 disabled:cursor-not-allowed disabled:shadow-none"
    >
      <i *ngIf="isUploading" class="fas fa-spinner fa-spin"></i>
      <i *ngIf="!isUploading" class="fas fa-upload"></i>
      <span *ngIf="!isUploading">
        {{ files.length > 0 ? 'העלה ' + files.length + (files.length === 1 ? ' קובץ' : ' קבצים') : 'העלה' }}
      </span>
      <span *ngIf="isUploading">מעלה...</span>
    </button>
  </div>

  <!-- רשימת סטטוס העלאות -->
  <div *ngIf="uploadStatuses.length > 0" class="mt-8">
    <h2 class="text-base font-semibold text-gray-700 mb-3">סטטוס העלאה</h2>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div
        *ngFor="let item of uploadStatuses; let last = last"
        class="px-5 py-4 flex flex-col gap-2"
        [class.border-b]="!last"
        [class.border-gray-100]="!last"
      >
        <!-- שורה עליונה: אייקון + שם קובץ + badge -->
        <div class="flex items-center justify-between gap-3">
          <!-- אייקון + שם -->
          <div class="flex items-center gap-3 min-w-0">
            <i [class]="'fas ' + item.fileIcon + ' text-lg flex-shrink-0 ' + item.fileIconColor"></i>
            <span
              class="text-sm font-medium text-gray-700 truncate"
              [title]="item.fileName"
            >
              {{ item.fileName }}
            </span>
          </div>

          <!-- badge סטטוס -->
          <span
            class="flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold whitespace-nowrap flex-shrink-0"
            [class]="getStatusClasses(item.status)"
          >
            <i *ngIf="item.status === 'processing'" class="fas fa-spinner fa-spin text-xs"></i>
            <i *ngIf="item.status === 'completed'" class="fas fa-check text-xs"></i>
            <i *ngIf="item.status === 'error'" class="fas fa-times text-xs"></i>
            <i *ngIf="item.status === 'PendingValidation'" class="fas fa-clock text-xs"></i>
            {{ getStatusLabel(item.status) }}
          </span>
        </div>

        <!-- Progress Bar (רק בזמן העלאה) -->
        <div *ngIf="item.status === 'uploading'" class="w-full">
          <div class="flex justify-between text-xs text-gray-400 mb-1">
            <span>מעלה...</span>
            <span>{{ item.progress }}%</span>
          </div>
          <div class="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden">
            <div
              class="bg-blue-500 h-1.5 rounded-full transition-all duration-300"
              [style.width.%]="item.progress"
            ></div>
          </div>
        </div>

        <!-- הודעת סטטוס -->
        <div *ngIf="item.message && item.status !== 'uploading'" class="text-xs text-gray-500">
          {{ item.message }}
        </div>

        <!-- הודעת שגיאה -->
        <div *ngIf="item.status === 'error' && item.message" class="flex items-center gap-1.5 text-xs text-red-600">
          <i class="fas fa-exclamation-triangle"></i>
          <span>{{ item.message }}</span>
        </div>

        <!-- כפתור סקירה -->
        <div *ngIf="item.canReview && item.documentId" class="flex justify-start mt-1">
          <button
            type="button"
            (click)="openReview(item.documentId)"
            class="flex items-center gap-2 px-4 py-1.5 bg-purple-500 hover:bg-purple-600 active:bg-purple-700
                   text-white text-xs font-semibold rounded-lg transition-colors duration-200 shadow-sm"
          >
            <i class="fas fa-search"></i>
            סקור ואשר
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
