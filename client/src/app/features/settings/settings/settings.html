<div class="settings-container fade-in">
    <div class="header-section">
      <h1>אזור אישי</h1>
      <p>נהל את פרטי החשבון והגדרות המערכת שלך</p>
    </div>
  
    <div class="grid-layout">
      <!-- פרטים אישיים -->
      <div class="card-wrapper">
        <p-card header="פרטים אישיים" styleClass="premium-card h-full">
          <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="form-grid">
            
            <div class="field">
              <label for="fullName">שם מלא</label>
              <input pInputText id="fullName" formControlName="fullName" placeholder="הכנס שם מלא" />
            </div>
  
            <div class="field">
              <label for="email">אימייל</label>
              <input pInputText id="email" formControlName="email" placeholder="example@email.com" />
            </div>
  
            <div class="field">
              <label for="phone">טלפון</label>
              <input pInputText id="phone" formControlName="phone" placeholder="050-0000000" />
            </div>
  
            <div class="field">
              <label for="address">כתובת</label>
              <input pInputText id="address" formControlName="address" placeholder="רחוב, עיר, מיקוד" />
            </div>
  
            <div class="actions">
              <p-button label="שמור שינויים" icon="pi pi-check" type="submit" styleClass="p-button-primary"></p-button>
            </div>
          </form>
        </p-card>
      </div>
  
      <!-- ניהול קטגוריות -->
      <div class="card-wrapper">
        <p-card header="ניהול קטגוריות" styleClass="premium-card h-full">
          <div class="categories-content" dir="rtl">
            <p class="text-gray-500 text-sm mb-4">קטגוריות שמוגדרות כאן יהיו זמינות לבחירה בעת אישור חשבוניות.</p>

            <div class="flex justify-start mb-4">
              <p-button
                label="הוסף קטגוריה"
                icon="pi pi-plus"
                (onClick)="showCategoryModal = true"
                styleClass="p-button-outlined"
              />
            </div>

            <p-divider />

            <!-- empty state -->
            <div *ngIf="categories.length === 0" class="text-center text-gray-400 py-8">
              <i class="fas fa-tags text-3xl mb-3 block"></i>
              <p class="text-sm">לא הוגדרו קטגוריות עדיין</p>
            </div>

            <!-- רשימת קטגוריות -->
            <ul *ngIf="categories.length > 0" class="categories-list">
              <li *ngFor="let cat of categories" class="category-item">
                <span class="category-name">
                  {{ cat.name }}
                  <p-tag *ngIf="cat.isGlobal" severity="info" value="ברירת מחדל"></p-tag>
                </span>
                <p-button
                  *ngIf="!cat.isGlobal"
                  icon="pi pi-trash"
                  styleClass="p-button-rounded p-button-text p-button-danger p-button-sm"
                  [loading]="isDeletingCategoryId === cat.id"
                  [disabled]="isDeletingCategoryId !== null"
                  (onClick)="deleteCategory(cat)"
                />
              </li>
            </ul>
          </div>
        </p-card>
      </div>
    </div>
  
    <!-- ניהול ספקים -->
    <div class="card-wrapper" style="grid-column: 1 / -1; margin-top: 1.5rem;">
      <p-card header="ניהול ספקים" styleClass="premium-card h-full">
        <div class="categories-content" dir="rtl">
          <p class="text-gray-500 text-sm mb-4">ספקים שמוגדרים כאן יהיו זמינים לבחירה בעת אישור חשבוניות.</p>

          <div class="flex justify-start mb-4">
            <p-button
              label="הוסף ספק"
              icon="pi pi-plus"
              (onClick)="showSupplierModal = true"
              styleClass="p-button-outlined"
            />
          </div>

          <p-divider />

          <!-- empty state -->
          <div *ngIf="suppliers.length === 0" class="text-center text-gray-400 py-8">
            <i class="fas fa-building text-3xl mb-3 block"></i>
            <p class="text-sm">לא הוגדרו ספקים עדיין</p>
          </div>

          <!-- רשימת ספקים -->
          <ul *ngIf="suppliers.length > 0" class="categories-list">
            <li *ngFor="let s of suppliers" class="category-item">
              <span class="category-name flex flex-col">
                <span class="font-medium">{{ s.name }}</span>
                <span class="text-xs text-gray-400">ח.פ {{ s.supNum }}</span>
              </span>
              <p-button
                icon="pi pi-trash"
                styleClass="p-button-rounded p-button-text p-button-danger p-button-sm"
                [loading]="isDeletingId === s.id"
                [disabled]="isDeletingId !== null"
                (onClick)="deleteSupplier(s)"
              />
            </li>
          </ul>
        </div>
      </p-card>
    </div>

    <p-toast position="bottom-center"></p-toast>
  </div>

<!-- מודאל יצירת ספק -->
<app-supplier-form-modal
  [visible]="showSupplierModal"
  (saved)="onSupplierCreated($event)"
  (cancelled)="showSupplierModal = false"
/>

<!-- מודאל יצירת קטגוריה -->
<app-category-form-modal
  [visible]="showCategoryModal"
  (saved)="onCategoryCreated($event)"
  (cancelled)="showCategoryModal = false"
/>
