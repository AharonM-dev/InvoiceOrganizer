<div class="auth" dir="rtl">
  <div class="auth-grid">

    <!-- Form pane -->
    <section class="auth-form">
      <div class="auth-brand">
        <div class="auth-brand-logo">IH</div>
        <span class="auth-brand-text">InvoiceHub</span>
      </div>

      <div class="auth-heading">
        <span class="wf-mono">כניסה לחשבון</span>
        <h2>ברוך שובך.</h2>
        <p>המשך מהמקום שעצרת.</p>
      </div>

      <form [formGroup]="loggingForm" (ngSubmit)="onSubmit()" class="auth-fields" novalidate>
        <div class="auth-field">
          <label for="login-email" class="wf-mono">אימייל</label>
          <input id="login-email" class="wf-input" type="email" formControlName="email"
                 placeholder="name@example.com" dir="ltr" autocomplete="email">
        </div>

        <div class="auth-field">
          <div class="auth-field-head">
            <label for="login-password" class="wf-mono">סיסמה</label>
            <a routerLink="/login" class="auth-field-aside">שכחת?</a>
          </div>
          <input id="login-password" class="wf-input" type="password" formControlName="password"
                 placeholder="••••••••" dir="ltr" autocomplete="current-password">
        </div>

        <div *ngIf="errorMessage" class="auth-error">
          <i class="pi pi-exclamation-circle"></i>
          <span>{{ errorMessage }}</span>
        </div>

        <button type="submit" class="wf-btn wf-btn-primary auth-submit">כניסה</button>

        <div class="auth-or">
          <span class="auth-or-line"></span>
          <span class="wf-mono">או</span>
          <span class="auth-or-line"></span>
        </div>

        <button type="button" class="wf-btn wf-btn-ghost auth-submit" disabled>המשך עם Google</button>
      </form>

      <div class="auth-foot">
        אין לך חשבון?
        <a routerLink="/register" class="auth-foot-link">הרשמה</a>
      </div>
    </section>

    <!-- Visual pane -->
    <aside class="auth-visual">
      <div class="wf-surface auth-visual-card auth-visual-stat">
        <span class="wf-mono">סה"כ הוצאות החודש</span>
        <div class="auth-visual-amount wf-num">₪ 42,580</div>
        <svg class="auth-visual-chart" viewBox="0 0 600 200" aria-hidden="true">
          <defs>
            <linearGradient id="login-lc" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stop-color="var(--wf-accent)" stop-opacity="0.18"/>
              <stop offset="100%" stop-color="var(--wf-accent)" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="M 10 140 C 60 90, 110 160, 160 120 S 260 80, 310 100 S 410 60, 460 80 S 560 50, 590 60"
                fill="none" stroke="var(--wf-accent)" stroke-width="1.8"/>
          <path d="M 10 140 C 60 90, 110 160, 160 120 S 260 80, 310 100 S 410 60, 460 80 S 560 50, 590 60 L 590 200 L 10 200 Z"
                fill="url(#login-lc)"/>
        </svg>
      </div>

      <div class="wf-surface auth-visual-card">
        <p class="auth-quote">"חיסכנו 4 שעות בשבוע על הזנת חשבוניות."</p>
        <div class="auth-quote-by">
          <div class="auth-quote-avatar">ר</div>
          <div class="auth-quote-meta">
            <span class="auth-quote-name">רוני שמיר</span>
            <span class="auth-quote-role">מנהלת כספים · Studio42</span>
          </div>
        </div>
      </div>
    </aside>

  </div>
</div>
